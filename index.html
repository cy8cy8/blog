<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chenxi's Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="index.html" class="site-title">CY's Words (No AI Involved)</a>
            <nav><a href="index.html">Home</a></nav>
        </div>
    </header>
    
    <main class="container">
        <div class="controls">
            <input type="search" id="search" placeholder="Search titles..." autocomplete="off">
            <select id="year"><option value="">Years</option></select>
            <select id="tag"><option value="">Tags</option></select>
            <select id="sort">
                <option value="desc">Newest</option>
                <option value="asc">Oldest</option>
            </select>
        </div>
        <div class="post-list" id="post-list">
            <p class="loading">Loading posts...</p>
        </div>
    </main>
    
    <script src="engine.js"></script>
</body>
</html>
